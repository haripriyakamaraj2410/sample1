<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Front Page</title>
    <style>
        body { font-family: sans-serif; margin: 0; line-height: 1.6; }
        nav { background: #333; color: #fff; padding: 1rem; text-align: center; }
        .hero { background: #f4f4f4; padding: 50px; text-align: center; }
        .container { padding: 20px; text-align: center; }
        .card { border: 1px solid #ddd; padding: 20px; margin: 10px; display: inline-block; width: 30%; }
    </style>
</head>
<body>
    <nav><h1>MyBrand</h1></nav>
    <header class="hero">
        <h1>Welcome</h1>
        <p>A simple, modern landing page.</p>
    </header>
    <main class="container">
        <div class="card"><h3>Feature 1</h3></div>
        <div class="card"><h3>Feature 2</h3></div>
        <div class="card"><h3>Feature 3</h3></div>
    </main>
</body>
</html>
